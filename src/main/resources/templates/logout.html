<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logout</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        .container {
            width: 100%;
            max-width: 400px;
            margin: 100px auto;
            background-color: #161b22;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
        }
        .github-logo {
            width: 50px;
            margin-bottom: 10px;
        }
        h2 {
            font-size: 18px;
            margin: 10px 0;
        }
        .user-box {
            background-color: #21262d;
            padding: 10px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        .user-info {
            display: flex;
            align-items: center;
        }
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin-right: 10px;
        }
        .username {
            font-size: 16px;
            font-weight: bold;
        }
        .signout-btn {
            background-color: #238636;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            color: white;
            cursor: pointer;
        }
        .signout-btn:hover {
            background-color: #2ea043;
        }
        .signout-all {
            width: 100%;
            background-color: #f85149;
            border: none;
            padding: 10px;
            border-radius: 5px;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }
        .signout-all:hover {
            background-color: #da3633;
        }
        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #8b949e;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" alt="GitHub Logo" class="github-logo">
    <h2>Select account to sign out</h2>

    <div class="user-box">
        <div class="user-info">
            <img src="https://avatars.githubusercontent.com/u/583231" alt="User Avatar" class="avatar">
            <span class="username" th:text="${username}">Foydalanuvchi</span>
        </div>

        <form action="/auth/logout" method="post">
            <input type="hidden" name="username" th:value="${username}">
            <button type="submit" class="signout-btn">Sign out</button>
        </form>
    </div>

    <form action="/auth/logout-all" method="post">
        <button type="submit" class="signout-all">Sign out from all accounts</button>
    </form>
</div>

<div class="footer">
    Terms &nbsp;•&nbsp; Privacy &nbsp;•&nbsp; Docs &nbsp;•&nbsp; Contact GitHub Support
</div>

</body>
</html>
