<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kitob qo‘shish</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <h2 class="text-center">Yangi kitob qo‘shish</h2>

    <form th:action="@{/auth/category/{id}/save-book(id=${category.id})}" method="post" enctype="multipart/form-data">
        <div class="mb-3">
            <label for="title" class="form-label">Kitob nomi:</label>
            <input type="text" id="title" name="title" class="form-control" required>
        </div>

        <div class="mb-3">
            <label for="author" class="form-label">Muallif:</label>
            <input type="text" id="author" name="author" class="form-control" required>
        </div>

        <div class="mb-3">
            <label for="file" class="form-label">Kitob fayli (PDF, Word va boshqalar):</label>
            <input type="file" id="file" name="file" class="form-control" accept=".pdf,.doc,.docx,.epub" required>
        </div>

        <button type="submit" class="btn btn-success">Saqlash</button>
        <a href="/categories" class="btn btn-secondary">Bekor qilish</a>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
