<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jadval va Paginatsiya</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      color: #333;
      margin: 0;
      padding: 0;
    }

    .container {
      width: 80%;
      margin: 0 auto;
      padding-top: 50px;
    }

    h1 {
      text-align: center;
      font-size: 36px;
      margin-bottom: 30px;
    }

    .table {
      width: 100%;
      border-collapse: collapse;
      background-color: #fff;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      margin-bottom: 30px;
    }

    .table th, .table td {
      padding: 12px;
      text-align: left;
      border: 1px solid #ddd;
    }

    /* Jadval chegarasining rangini o'zgartirish */
    .table-bordered {
      border-color: #007bff;
    }
    .table-bordered th, .table-bordered td {
      border-color: #007bff;
    }

    .pagination-container {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .pagination {
      display: inline-flex;
      padding: 10px 0;
      list-style: none;
    }

    .page-item {
      margin: 0 5px;
    }

    .page-link {
      padding: 10px 20px;
      background-color: #007bff;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      border: 1px solid #007bff;
      transition: background-color 0.3s ease;
    }

    .page-link:hover {
      background-color: #0056b3;
    }

    .page-item.disabled .page-link {
      background-color: #e0e0e0;
      border-color: #ccc;
      cursor: not-allowed;
    }

    .page-item.active .page-link {
      background-color: #0056b3;
      border-color: #0056b3;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Jadval va Paginatsiya</h1>
  <div class="table-responsive">
    <table class="table table-bordered">
      <thead>
      <tr>
        <th>#</th>
        <th>Ism</th>
        <th>Familiya</th>
      </tr>
      </thead>
      <tbody>
      <tr>
        <td>1</td>
        <td>John</td>
        <td>Doe</td>
      </tr>
      <tr>
        <td>2</td>
        <td>Jane</td>
        <td>Smith</td>
      </tr>
      <tr>
        <td>3</td>
        <td>Mike</td>
        <td>Johnson</td>
      </tr>
      <tr>
        <td>4</td>
        <td>Amy</td>
        <td>Wilson</td>
      </tr>
      <tr>
        <td>5</td>
        <td>Chris</td>
        <td>Davis</td>
      </tr>
      <tr>
        <td>6</td>
        <td>Patricia</td>
        <td>Brown</td>
      </tr>
      <tr>
        <td>7</td>
        <td>James</td>
        <td>Williams</td>
      </tr>
      <tr>
        <td>8</td>
        <td>Linda</td>
        <td>Miller</td>
      </tr>
      <tr>
        <td>9</td>
        <td>Paul</td>
        <td>Moore</td>
      </tr>
      <tr>
        <td>10</td>
        <td>Laura</td>
        <td>Taylor</td>
      </tr>
      </tbody>
    </table>
  </div>

  <!-- Paginatsiya boshqaruvlari -->
  <div class="pagination-container">
    <nav aria-label="Page navigation example">
      <ul class="pagination">
        <li class="page-item">
          <a class="page-link" href="#" aria-label="Previous">
            <span aria-hidden="true">&laquo;</span>
          </a>
        </li>
        <li class="page-item"><a class="page-link" href="#">1</a></li>
        <li class="page-item"><a class="page-link" href="#">2</a></li>
        <li class="page-item"><a class="page-link" href="#">3</a></li>
        <li class="page-item">
          <a class="page-link" href="#" aria-label="Next">
            <span aria-hidden="true">&raquo;</span>
          </a>
        </li>
      </ul>
    </nav>
  </div>
</div>

</body>
</html>
