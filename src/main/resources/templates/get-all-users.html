<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barcha Aktiv Foydalanuvchilar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f4f4;
            padding: 20px;
            color: #333;
        }

        h1 {
            text-align: center;
            color: #1A285A;
            margin-bottom: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .user-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .user {
            background-color: #fff;
            border: 1px solid #ddd;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }

        .user:hover {
            transform: scale(1.05);
        }

        .user-info {
            margin-bottom: 20px;
        }

        .user-info p {
            font-size: 14px;
            margin: 5px 0;
        }

        .user-actions {
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        .user-actions button {
            padding: 10px 15px;
            font-size: 14px;
            border: none;
            background-color: #1A285A;
            color: #fff;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .user-actions button:hover {
            background-color: #334E8E;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        .pagination button {
            padding: 10px 15px;
            font-size: 14px;
            border: none;
            background-color: #28a745;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        .pagination button:disabled {
            background-color: #ddd;
            cursor: not-allowed;
        }

        .pagination button:hover {
            background-color: #218838;
        }

        .pagination span {
            font-size: 16px;
            color: #1A285A;
        }
    </style>
</head>
<body>
<h1>Barcha Aktiv Foydalanuvchilar</h1>

<div class="container">
    <div class="user-list">
        <!-- Bu yerda serverdan olingan foydalanuvchilar ro'yxatini chiqaramiz -->
        <div th:each="user : ${users}" class="user">
            <div class="user-info">
                <p><strong>Ism:</strong> <span th:text="${user.name}"></span></p>
                <p><strong>Email:</strong> <span th:text="${user.email}"></span></p>
                <p><strong>Status:</strong> <span th:text="${user.status}"></span></p>
            </div>
            <div class="user-actions">
                <button>Block</button>
                <button>Delete</button>
            </div>
        </div>
    </div>

    <div class="pagination">
        <button>Oldingi</button>
        <span>1</span>
        <button>Keyingi</button>
    </div>
</div>
</body>
</html>
