<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitoblar Kutubxonasi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .container {
            max-width: 800px;
            margin-top: 50px;
        }
        .file-card {
            transition: 0.3s;
        }
        .file-card:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
<div class="container text-center">
    <h2 class="mb-4">📚 Kutubxona</h2>
    <div class="row">
        <div class="col-md-6 mb-3">
            <div class="card file-card p-3">
                <h5>📄 PDF Kitob</h5>
                <embed src="files/sample.pdf" type="application/pdf" width="100%" height="300px" />
                <form action="/open-pdf" method="get">
                    <input type="hidden" name="file" value="sample.pdf">
                    <button type="submit" class="btn btn-primary mt-2">PDF-ni ochish</button>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
