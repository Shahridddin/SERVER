<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-Kutubxona Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html, body {
            height: 100%;
            min-height: 100vh;
            background-image: url('https://www.ito.org.tr/documents/Haber/news/detail_page_books_in_134_languages_available_24_7_04.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        body {
            background-color: rgba(6, 78, 59, 0.85);
            backdrop-filter: blur(5px);
        }
    </style>
</head>
<body class="text-white">

<div class="container mx-auto p-4 sm:p-6 bg-green-900 bg-opacity-80 rounded-lg shadow-lg">
    <!-- HEADER -->
    <header class="flex justify-between items-center py-4 flex-wrap">
        <button id="menu-btn" class="text-3xl focus:outline-none ml-2 md:hidden">&#9776;</button>
        <h1 class="text-2xl sm:text-3xl font-bold text-center w-full md:w-auto">e-Kutubxona</h1>
        <input type="text" id="search" placeholder="Qidirish..." class="p-2 text-black rounded-md border border-gray-300 focus:ring-2 focus:ring-blue-500 w-full md:w-1/3">
    </header>

    <!-- SIDEBAR -->
    <nav id="sidebar" class="fixed left-0 top-0 w-64 h-full bg-white text-black shadow-lg transform -translate-x-full transition-transform duration-300 p-4 z-50 md:translate-x-0 md:relative md:h-auto md:w-1/4">
        <button id="close-btn" class="text-2xl focus:outline-none absolute top-3 right-4 md:hidden">&times;</button>
        <ul class="mt-4 space-y-4">
            <li><a href="#" class="block p-3 rounded hover:bg-gray-200 transition">📚 Kitob Qo'shish</a></li>
            <li><a href="#" class="block p-3 rounded hover:bg-gray-200 transition">📖 O'qish</a></li>
            <li><a href="#" class="block p-3 rounded hover:bg-gray-200 transition">📊 Statistika</a></li>
        </ul>
        <hr class="my-4 border-t border-gray-300">
        <button class="block w-full p-3 text-left hover:bg-gray-200 rounded">⚙️ Sozlamalar</button>
        <button class="block w-full p-3 text-left text-red-600 hover:bg-gray-200 rounded">🚪 Chiqish</button>
    </nav>

    <div class="flex justify-center items-center min-h-screen md:ml-64">
        <section class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 w-full">
            <div class="bg-white text-black p-6 rounded-lg text-center shadow-lg">
                <h2 class="text-xl font-semibold">Kitob Qo'shish</h2>
                <button class="mt-4 bg-green-700 text-white px-4 py-2 rounded hover:bg-green-900 transition">Qo'shish</button>
            </div>
            <div class="bg-white text-black p-6 rounded-lg text-center shadow-lg">
                <h2 class="text-xl font-semibold">Mavjud Kitoblar</h2>
                <button class="mt-4 bg-blue-700 text-white px-4 py-2 rounded hover:bg-blue-900 transition">Ko'rish</button>
            </div>
            <div class="bg-white text-black p-6 rounded-lg text-center shadow-lg">
                <h2 class="text-xl font-semibold">O'qish</h2>
                <button class="mt-4 bg-purple-700 text-white px-4 py-2 rounded hover:bg-purple-900 transition">O'qish</button>
            </div>
            <div class="bg-white text-black p-6 rounded-lg text-center shadow-lg">
                <h2 class="text-xl font-semibold">Faol foydalanuvchilar</h2>
                <button class="mt-4 bg-red-700 text-white px-4 py-2 rounded hover:bg-red-900 transition">Ro‘yxat</button>
            </div>
        </section>
    </div>
</div>

<script>
    document.getElementById("menu-btn").addEventListener("click", function() {
        document.getElementById("sidebar").classList.remove("-translate-x-full");
    });
    document.getElementById("close-btn").addEventListener("click", function() {
        document.getElementById("sidebar").classList.add("-translate-x-full");
    });
</script>

</body>
</html>
